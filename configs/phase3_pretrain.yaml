# ────────────────────────────────────────────────────────────────────────── #
# Phase 3: pretrain the 25M-param Llama base model.                         #
#                                                                            #
# REVISED STRATEGY (§11.6): clean tier ONLY — BSM moved to Phase 4c.         #
# Pretraining on web/news/legal text (Latxa) gives a strong general LM;     #
# conversational register is added as a final finetune (Phase 4c), matching  #
# FUTO's own English pipeline (SlimPajama pretrain → conversational finetune).#
#                                                                            #
# OUTPUT: pretrain/base/ (LlamaForCausalLM checkpoint)                       #
# ────────────────────────────────────────────────────────────────────────── #

dataset: clean            # clean tier ONLY (NOT conversational — see §11.6)

# ── model architecture (matches reference English model, except vocab) ──── #
# Verified against breadlicker45/futo-keyboard-lm in Phase 0.
# vocab_size is read from the tokenizer at runtime (not hardcoded here).
model:
  hidden_size: 512
  intermediate_size: 1024
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8           # MHA, no GQA (matches reference)
  max_position_embeddings: 2048    # llama.context_length from reference
  rms_norm_eps: 1.0e-6             # NOT 1e-5 (matches reference)
  rope_theta: 10000.0
  tie_word_embeddings: false       # reference has separate output.weight + token_embd

# ── training hyperparameters ────────────────────────────────────────────── #
seq_len: 1024
micro_batch: 16
grad_accum: 16                   # global batch = 256
# bench_l40.py empirically proves micro=16 is OPTIMAL for this 25M model on
# the L40: 276K tok/s at micro=16 vs 176K at micro=128 (37% slower).
# Low VRAM (4GB/46GB) is expected for a tiny model — GPU is compute-saturated.
lr: 3.0e-4
weight_decay: 0.1
warmup_steps: 2000
save_every: 5000
save_total_limit: 5              # keep last 5 checkpoints — pick best by loss
num_workers: 6                  # 8 CPU cores: 6 dataloader + 2 main process
seed: 1337

# ── steps ────────────────────────────────────────────────────────────────── #
# At global batch 256 × seq_len 1024 = 262K tokens/step.
# Morpheus 91M converged at 8.8B tokens (97:1). Our 25M model should converge
# earlier. Chinchilla optimal = 500M (20:1). MiniCPM = 4.8B (192:1).
# Full = 24k steps ≈ 6.3B tokens-seen ≈ 2 epochs of 3B staged ≈ 252:1 ratio.
# (Watch the loss curve — if it plateaus before 24k, use an earlier checkpoint.)
modes:
  mini:
    total_steps: 2000            # ~524M tokens ≈ 1 epoch — pipeline validation
    warmup_steps: 200            # 10% of total (default 2000 would = all steps!)
    save_every: 500
  full:
    total_steps: 24000           # ~6.3B tokens-seen ≈ 2 epochs of 3B staged
    warmup_steps: 2000           # ~8% of total
    save_every: 5000             # 5 checkpoints — pick best by loss curve
