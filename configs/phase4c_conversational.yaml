# ────────────────────────────────────────────────────────────────────────── #
# Phase 4c: conversational adaptation finetune  (NEW — was missing!).        #
#                                                                            #
# FUTO's own wiki calls this "an important step" — the model is finetuned    #
# on a small corpus of conversational text (BERnaT BSM) to shift register    #
# from Wikipedia/web toward chat/SMS (§11.6.1).                              #
#                                                                            #
# Without this stage, the model suggests Wikipedia-register continuations     #
# ("Furthermore, ...") instead of chat-register ("yeah, ...").               #
#                                                                            #
# FUTO wiki: "finetuned on a much smaller corpus representing Internet       #
# first-person speech with the same 1/3 misspelling augmentation. This has   #
# appeared to be an important step for the model to comprehend that          #
# sentences can start with 'I'm', certain slang/lingo, etc."                 #
#                                                                            #
# INPUT:  finetune/stage_b/final/ + corpora/conversational (BERnaT BSM)      #
# OUTPUT: finetune/stage_c/final/                                            #
# ────────────────────────────────────────────────────────────────────────── #

dataset: conversational      # BERnaT BSM (corpora/conversational) — NOT clean

# ── typo injection ───────────────────────────────────────────────────────── #
# SAME 1/3 misspelling augmentation as Phase 4b (per FUTO wiki: "the same").
# The model must still do autocorrect — just now on conversational text.
typo_rate: 0.33

# ── loss ─────────────────────────────────────────────────────────────────── #
plw: 1.0                     # full-sequence loss — register shift needs clean-context training
                            # (4b uses 0.05 to preserve pretrain; 4c is short so overfit risk is bounded)

# ── training ─────────────────────────────────────────────────────────────── #
seq_len: 512
micro_batch: 24
grad_accum: 8                 # global batch = 192
lr: 2.0e-5                    # LOWER than 4b (5e-5) — adaptation, not retraining
warmup_steps: 200
save_every: 1000
save_total_limit: 3
num_workers: 4
seed: 1337

# ── steps ────────────────────────────────────────────────────────────────── #
# BSM is ~250M tokens (full). At global batch 192 × seq_len 512 = 98K tokens/step.
# 5000 steps ≈ 490M tokens-seen ≈ ~2 epochs of 250M BSM.
# "A much smaller corpus" per FUTO wiki — this is intentionally short.
modes:
  mini:
    total_steps: 1000         # ~7 min on L40 — quick adaptation on 25M BSM
  full:
    total_steps: 5000          # ~35 min — full conversational adaptation
